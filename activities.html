<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Activities — Green Wadi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gw.css">
<style>
  body { padding-top: 72px; background: #F8F9F5; overflow-x: hidden; }

  /* Floating orbs */
  .orb-bg { position: fixed; pointer-events: none; border-radius: 999px; filter: blur(90px); z-index: 0; }
  .orb-bg-1 { width: 600px; height: 600px; top: -100px; left: 10%; background: radial-gradient(circle, rgba(16,185,129,0.14), transparent 70%); animation: o1 22s ease-in-out infinite; }
  .orb-bg-2 { width: 500px; height: 500px; bottom: 15vh; right: -80px; background: radial-gradient(circle, rgba(244,199,123,0.18), transparent 70%); animation: o2 26s ease-in-out infinite; }
  @keyframes o1 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(60px,80px);} }
  @keyframes o2 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-50px,-70px);} }

  /* Hero */
  .hero-inner {
    padding: 96px 0 56px;
    background:
      radial-gradient(60% 50% at 30% 20%, rgba(16,185,129,0.12), transparent 60%),
      radial-gradient(40% 40% at 80% 80%, rgba(244,199,123,0.18), transparent 60%),
      #F8F9F5;
    position: relative; overflow: hidden;
  }

  /* Map container — 80vw, dramatic 3D */
  .map-wrap {
    display: flex;
    justify-content: center;
    padding: 48px 0;
    position: relative;
  }

  /* Pulsing dots overlay */
  .dot-overlay {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
  }
  .pulse-dot {
    position: absolute;
    width: 14px; height: 14px;
    transform: translate(-50%, -50%);
  }
  .pulse-dot::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 999px;
    background: #10B981;
    animation: pulseDot 2.2s ease-out infinite;
  }
  .pulse-dot::after {
    content: "";
    position: absolute; inset: -6px;
    border-radius: 999px;
    border: 1.5px solid rgba(16,185,129,0.55);
    animation: pulseDot 2.2s ease-out infinite;
    animation-delay: 0.55s;
  }
  .pulse-dot .inner {
    position: absolute; inset: 3px;
    background: #fff; border-radius: 999px; z-index: 1;
  }
  @keyframes pulseDot {
    0% { transform: scale(0.6); opacity: 0.9; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* 3D scene */
  .scene {
    perspective: 1400px;
    perspective-origin: 50% 40%;
    width: 80vw;
    max-width: 1200px;
    position: relative;
  }
  .img-stage {
    transform-style: preserve-3d;
    transform: rotateX(18deg) rotateY(-4deg) scale(0.88);
    opacity: 0;
    transition: transform 1.2s cubic-bezier(0.2,0.8,0.2,1), opacity 1s ease, box-shadow 0.6s;
    border-radius: 22px; overflow: hidden;
    box-shadow: 0 60px 120px -30px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.1);
    position: relative;
  }
  .img-stage.revealed {
    transform: rotateX(0deg) rotateY(0deg) scale(1);
    opacity: 1;
  }
  .img-stage:hover {
    transform: rotateX(-3deg) rotateY(4deg) scale(1.02);
    box-shadow: 0 80px 160px -40px rgba(0,0,0,0.6);
  }
  .img-3d { width: 100%; display: block; }
  .img-reflection {
    position: absolute; bottom: -40%; left: 0; right: 0; height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
    transform: scaleY(-1); opacity: 0.3; pointer-events: none;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
  }

  .animate-text { opacity: 0; transform: translateY(40px); }
</style>
</head>
<body data-page="activities">

<div class="orb-bg orb-bg-1" aria-hidden="true"></div>
<div class="orb-bg orb-bg-2" aria-hidden="true"></div>

<!-- Hero -->
<section class="hero-inner" style="position:relative; z-index:1;">
  <div class="wrap">
    <div class="eyebrow mb-5 animate-text">— Activities</div>
    <h1 class="h1 max-w-[20ch] animate-text">Activities</h1>
  </div>
</section>

<!-- World map — dramatic 3D perspective -->
<section class="section" style="padding-top: 24px; padding-bottom: 80px; position:relative; z-index:1;">
  <div class="map-wrap">
    <div class="scene">
      <div class="img-stage" id="mapStage">
        <img src="/images/worldmap.png" class="img-3d img-parallax" alt="Green Wadi Global Activities — 12 Countries"/>
        <div class="img-reflection"></div>

        <!-- Pulsing activity dots overlaid on the map -->
        <div class="dot-overlay" aria-hidden="true">
          <!-- Middle East / Israel -->
          <div class="pulse-dot" style="top:42%; left:58%;" title="Israel">
            <div class="inner"></div>
          </div>
          <!-- Africa (East) -->
          <div class="pulse-dot" style="top:56%; left:55%; animation-delay:0.3s;" title="East Africa">
            <div class="inner"></div>
          </div>
          <!-- Africa (West) -->
          <div class="pulse-dot" style="top:51%; left:44%; animation-delay:0.6s;" title="West Africa">
            <div class="inner"></div>
          </div>
          <!-- Gulf / Arabia -->
          <div class="pulse-dot" style="top:46%; left:61%; animation-delay:0.9s;" title="Arabian Peninsula">
            <div class="inner"></div>
          </div>
          <!-- Europe -->
          <div class="pulse-dot" style="top:32%; left:48%; animation-delay:0.4s;" title="Europe">
            <div class="inner"></div>
          </div>
          <!-- South Asia -->
          <div class="pulse-dot" style="top:44%; left:68%; animation-delay:0.7s;" title="South Asia">
            <div class="inner"></div>
          </div>
          <!-- Southeast Asia -->
          <div class="pulse-dot" style="top:50%; left:76%; animation-delay:1s;" title="Southeast Asia">
            <div class="inner"></div>
          </div>
          <!-- South America -->
          <div class="pulse-dot" style="top:62%; left:28%; animation-delay:0.2s;" title="South America">
            <div class="inner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="gw-footer-mount"></div>
<script src="/js/gw.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// Text stagger on scroll
gsap.utils.toArray('.animate-text').forEach(el => {
  gsap.from(el, {
    scrollTrigger: { trigger: el, start: 'top 90%' },
    y: 40, opacity: 0, duration: 0.9, ease: 'power3.out'
  });
});

// 3D image ScrollTrigger reveal
document.querySelectorAll('.img-stage').forEach(el => {
  ScrollTrigger.create({
    trigger: el,
    start: 'top 85%',
    onEnter: () => el.classList.add('revealed')
  });
});

// Mouse 3D tilt
document.querySelectorAll('.img-stage').forEach(el => {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(1400px) rotateX(${-y * 12}deg) rotateY(${x * 12}deg) scale(1.03)`;
  });
  el.addEventListener('mouseleave', () => {
    if (el.classList.contains('revealed')) el.style.transform = '';
  });
});

// Parallax on scroll
gsap.utils.toArray('.img-parallax').forEach(el => {
  gsap.to(el, {
    scrollTrigger: { trigger: el, scrub: 1.5 },
    y: -60, ease: 'none'
  });
});
</script>
</body>
</html>
