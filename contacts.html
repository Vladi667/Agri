<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contacts — Green Wadi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gw.css">
<script src="/js/auth.js"></script>
<style>
  body { padding-top: 72px; background: #F8F9F5; overflow-x: hidden; }

  /* Floating orbs */
  .orb-bg { position: fixed; pointer-events: none; border-radius: 999px; filter: blur(90px); z-index: 0; }
  .orb-bg-1 { width: 600px; height: 600px; top: -100px; right: -80px; background: radial-gradient(circle, rgba(16,185,129,0.16), transparent 70%); animation: o1 20s ease-in-out infinite; }
  .orb-bg-2 { width: 500px; height: 500px; bottom: 10vh; left: -80px; background: radial-gradient(circle, rgba(244,199,123,0.18), transparent 70%); animation: o2 24s ease-in-out infinite; }
  @keyframes o1 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-55px,80px);} }
  @keyframes o2 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(70px,-60px);} }

  /* Hero */
  .hero-inner {
    padding: 96px 0 64px;
    background:
      radial-gradient(60% 50% at 80% 20%, rgba(16,185,129,0.12), transparent 60%),
      radial-gradient(40% 40% at 10% 80%, rgba(244,199,123,0.18), transparent 60%),
      #F8F9F5;
    position: relative; overflow: hidden;
  }

  /* Card 3D flip container */
  .card-flip-wrap {
    perspective: 1000px;
    max-width: 520px;
  }

  /* The profile card — starts flipped */
  .profile-card {
    background: #fff;
    border: 1px solid rgba(15,23,42,0.08);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 56px -20px rgba(15,23,42,0.18);
    transform: rotateY(90deg) scale(0.9);
    opacity: 0;
    transition: transform 1s cubic-bezier(0.2,0.8,0.2,1), opacity 0.9s ease, box-shadow 0.6s;
  }
  .profile-card.in {
    transform: rotateY(0deg) scale(1);
    opacity: 1;
  }
  .profile-card:hover {
    box-shadow: 0 40px 80px -30px rgba(15,23,42,0.28);
  }

  /* Card header */
  .profile-head {
    background: linear-gradient(135deg, #0B4D35 0%, #1F5F3A 50%, #0F7B52 100%);
    padding: 44px 36px 36px;
    position: relative; overflow: hidden;
  }
  .profile-head::before {
    content: "";
    position: absolute; top: -60px; right: -60px;
    width: 280px; height: 280px; border-radius: 999px;
    background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
    pointer-events: none;
  }
  .profile-head::after {
    content: "";
    position: absolute; bottom: -50px; left: -30px;
    width: 220px; height: 220px; border-radius: 999px;
    background: radial-gradient(circle, rgba(244,199,123,0.1), transparent 70%);
    pointer-events: none;
  }

  /* Avatar */
  .profile-avatar {
    width: 80px; height: 80px; border-radius: 999px;
    background: linear-gradient(135deg, #F4C77B, #E9A864);
    border: 3px solid rgba(255,255,255,0.8);
    display: flex; align-items: center; justify-content: center;
    font-family: "Fraunces", serif; font-size: 28px;
    color: #0B4D35; font-weight: 400;
    margin-bottom: 18px; position: relative; z-index: 1;
    box-shadow: 0 8px 20px -6px rgba(15,23,42,0.35);
  }

  .profile-name {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.02em; color: #fff; line-height: 1;
    position: relative; z-index: 1;
  }
  .profile-creds {
    font-size: 13px; color: rgba(255,255,255,0.72);
    margin-top: 8px; letter-spacing: 0.04em;
    position: relative; z-index: 1;
  }
  .profile-role {
    margin-top: 14px; display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(8px);
    font-size: 12.5px; color: rgba(255,255,255,0.9);
    letter-spacing: 0.06em; position: relative; z-index: 1;
  }
  .profile-former {
    margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.58);
    max-width: 42ch; line-height: 1.55; position: relative; z-index: 1;
  }
  .profile-company {
    margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.7);
    position: relative; z-index: 1; line-height: 1.5;
  }

  /* Card body rows */
  .profile-body { padding: 32px 36px; }
  .contact-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0; border-bottom: 1px solid rgba(15,23,42,0.06);
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, #E9FBF3, #B9E6D0);
    display: flex; align-items: center; justify-content: center;
    color: #0F7B52; flex-shrink: 0;
  }
  .contact-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #64748B; }
  .contact-value { font-size: 15px; color: #0B1220; font-weight: 500; margin-top: 3px; }
  .contact-value a { color: #0F7B52; text-decoration: none; }
  .contact-value a:hover { text-decoration: underline; }

  .animate-text { opacity: 0; transform: translateY(40px); }
</style>
</head>
<body data-page="contacts">
<script>
  document.addEventListener('DOMContentLoaded', function(){ requireLogin(); });
</script>

<div class="orb-bg orb-bg-1" aria-hidden="true"></div>
<div class="orb-bg orb-bg-2" aria-hidden="true"></div>

<!-- Hero -->
<section class="hero-inner" style="position:relative; z-index:1;">
  <div class="wrap">
    <div class="eyebrow mb-5 animate-text">— Contacts</div>
    <h1 class="h1 max-w-[22ch] animate-text">Contacts</h1>
  </div>
</section>

<!-- Centered profile card -->
<section class="section" style="padding-top: 48px; position:relative; z-index:1;">
  <div class="wrap" style="display:flex; justify-content:center;">
    <div class="card-flip-wrap" style="width:100%;">

      <div class="profile-card" id="contactCard">

        <!-- Header -->
        <div class="profile-head">
          <div class="profile-avatar">SF</div>
          <div class="profile-name">Shmuel Friedman</div>
          <div class="profile-creds">M.A.Adm. &nbsp;·&nbsp; M.A.Sc.Agr. &nbsp;·&nbsp; B.A.Sc.Agr.</div>
          <div class="profile-role">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M8 5v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            CEO
          </div>
          <div class="profile-former">The Former Chief of Staff for the Minister of Agriculture, Israel</div>
          <div class="profile-company">Green Wadi – Advanced Agriculture and Know-How Ltd.</div>
        </div>

        <!-- Body -->
        <div class="profile-body">

          <div class="contact-row">
            <div class="contact-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.8 19.8 0 01.06 1.18 2 2 0 012.04 0h3a2 2 0 012 1.72 12.9 12.9 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.9 12.9 0 002.81.7A2 2 0 0122 14.92z"/>
              </svg>
            </div>
            <div>
              <div class="contact-label">Tel.</div>
              <div class="contact-value"><a href="tel:+972506241818">+972-50-6241818</a></div>
            </div>
          </div>

          <div class="contact-row">
            <div class="contact-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div>
              <div class="contact-label">Email</div>
              <div class="contact-value"><a href="mailto:Sam@green-wadi.com">Sam@green-wadi.com</a></div>
            </div>
          </div>

          <div class="contact-row">
            <div class="contact-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div>
              <div class="contact-label">Address</div>
              <div class="contact-value">Sde Yaakov, 3658600 Israel</div>
            </div>
          </div>

        </div>
      </div><!-- .profile-card -->

    </div>
  </div>
</section>

<div id="gw-footer-mount"></div>
<script src="/js/gw.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// Text stagger on scroll
gsap.utils.toArray('.animate-text').forEach(el => {
  gsap.from(el, {
    scrollTrigger: { trigger: el, start: 'top 90%' },
    y: 40, opacity: 0, duration: 0.9, ease: 'power3.out'
  });
});

// 3D flip card entrance — trigger on scroll + also on load (card is near top)
const card = document.getElementById('contactCard');
function revealCard() {
  card.classList.add('in');
}
ScrollTrigger.create({
  trigger: card,
  start: 'top 88%',
  onEnter: revealCard,
  once: true
});
// Also trigger if visible on load
setTimeout(() => {
  const r = card.getBoundingClientRect();
  if (r.top < window.innerHeight * 0.9) revealCard();
}, 400);

// Hover 3D tilt on the card
card.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width - 0.5;
  const y = (e.clientY - r.top) / r.height - 0.5;
  card.style.transform = `perspective(1000px) rotateX(${-y * 6}deg) rotateY(${x * 6}deg) scale(1.01)`;
});
card.addEventListener('mouseleave', () => {
  card.style.transform = '';
});
</script>
</body>
</html>
