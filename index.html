<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Green Wadi — Precision. Growth. Legacy.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gw.css">
<style>
  body { padding-top: 72px; background: #0B1220; overflow-x: hidden; }

  /* ── Floating background orbs ── */
  .orb-bg {
    position: fixed; pointer-events: none; border-radius: 999px; filter: blur(80px); z-index: 0;
  }
  .orb-bg-1 {
    width: 700px; height: 700px; top: -200px; right: -100px;
    background: radial-gradient(circle, rgba(233,168,100,0.28), transparent 70%);
    animation: orbDrift1 18s ease-in-out infinite;
  }
  .orb-bg-2 {
    width: 500px; height: 500px; bottom: 10vh; left: -100px;
    background: radial-gradient(circle, rgba(16,185,129,0.18), transparent 70%);
    animation: orbDrift2 22s ease-in-out infinite;
  }
  .orb-bg-3 {
    width: 400px; height: 400px; top: 40vh; left: 40%;
    background: radial-gradient(circle, rgba(244,199,123,0.14), transparent 70%);
    animation: orbDrift3 26s ease-in-out infinite;
  }
  @keyframes orbDrift1 { 0%,100%{transform:translate(0,0);} 33%{transform:translate(-60px,80px);} 66%{transform:translate(40px,-40px);} }
  @keyframes orbDrift2 { 0%,100%{transform:translate(0,0);} 33%{transform:translate(80px,-60px);} 66%{transform:translate(-30px,50px);} }
  @keyframes orbDrift3 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-40px,60px);} }

  /* ── Hero section ── */
  .hero {
    position: relative; width: 100%; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* The 3D background image card */
  .scene {
    perspective: 1400px;
    perspective-origin: 50% 40%;
    position: absolute;
    inset: -5%;
    z-index: 1;
  }
  .img-stage {
    transform-style: preserve-3d;
    transform: rotateX(18deg) rotateY(-4deg) scale(0.88);
    opacity: 0;
    transition: transform 1.8s cubic-bezier(0.2,0.8,0.2,1), opacity 1.4s ease, box-shadow 0.6s;
    border-radius: 0;
    overflow: hidden;
    width: 100%; height: 100%;
    box-shadow: 0 60px 120px -30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .img-stage.revealed {
    transform: rotateX(0deg) rotateY(0deg) scale(1);
    opacity: 1;
  }
  .img-stage img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  /* Dark overlay on bg image */
  .img-stage::before {
    content: "";
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(
      180deg,
      rgba(11,18,32,0.55) 0%,
      rgba(11,18,32,0.2) 40%,
      rgba(11,18,32,0.6) 100%
    );
  }
  .img-reflection {
    position: absolute; bottom: -40%; left: 0; right: 0; height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.04), transparent);
    transform: scaleY(-1); opacity: 0.2; pointer-events: none;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
  }

  /* Hero copy above the image */
  .hero-copy {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 0 24px;
  }
  .hero-logo {
    width: clamp(90px, 14vw, 160px);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.15);
    opacity: 0;
    margin-bottom: 48px;
  }
  .hero-title {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(72px, 13vw, 200px);
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: #F8F9F5;
    opacity: 0;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }
  .hero-tagline {
    margin-top: 28px;
    font-size: clamp(14px, 2vw, 20px);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(248,249,245,0.7);
    opacity: 0;
  }

  /* Scroll arrow */
  .scroll-arrow {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0;
  }
  .scroll-arrow span {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(248,249,245,0.55);
  }
  .scroll-arrow .bar {
    width: 1px; height: 50px; position: relative; overflow: hidden;
    background: linear-gradient(180deg, transparent, rgba(248,249,245,0.4));
  }
  .scroll-arrow .bar::after {
    content: ""; position: absolute; inset: -100% 0 auto 0; height: 100%;
    background: linear-gradient(180deg, transparent, #10B981);
    animation: scrollDown 2.4s cubic-bezier(.4,0,.2,1) infinite;
  }
  @keyframes scrollDown { 0%{transform:translateY(0);} 100%{transform:translateY(300%);} }
</style>
</head>
<body data-page="index">

<!-- Floating ambient orbs -->
<div class="orb-bg orb-bg-1" aria-hidden="true"></div>
<div class="orb-bg orb-bg-2" aria-hidden="true"></div>
<div class="orb-bg orb-bg-3" aria-hidden="true"></div>

<!-- Full-viewport hero -->
<section class="hero">
  <!-- 3D cinematic background image -->
  <div class="scene">
    <div class="img-stage" id="heroImgStage">
      <img src="/images/backround.png" alt="Green Wadi — Advanced Agriculture" class="img-parallax" id="heroBg"/>
      <div class="img-reflection"></div>
    </div>
  </div>

  <!-- Centered hero copy -->
  <div class="hero-copy">
    <img src="/images/logo.jpg" alt="Green Wadi" class="hero-logo" id="heroLogo"/>
    <h1 class="hero-title" id="heroTitle">Green Wadi</h1>
    <p class="hero-tagline" id="heroTagline">Precision &nbsp;·&nbsp; Growth &nbsp;·&nbsp; Legacy</p>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-arrow" id="scrollArrow">
    <span>Scroll</span>
    <div class="bar"></div>
  </div>
</section>

<div id="gw-footer-mount"></div>
<script src="/js/gw.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// ── 1. Cinematic reveal: bg image straightens on load ──
const imgStage = document.getElementById('heroImgStage');
imgStage.classList.add('revealed'); // triggers CSS transition

// ── 2. Intro sequence ──
const tl = gsap.timeline({ defaults: { ease: 'expo.out' } });
tl
  .to('#heroLogo', { opacity: 1, y: 0, duration: 1.4, delay: 0.5 })
  .to('#heroTitle', { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out' }, '-=0.6')
  .to('#heroTagline', { opacity: 1, duration: 1.1 }, '-=0.4')
  .to('#scrollArrow', { opacity: 1, duration: 0.9 }, '-=0.3');

gsap.set(['#heroLogo','#heroTitle','#heroTagline'], { y: 30 });
gsap.to(['#heroLogo','#heroTitle','#heroTagline'], { y: 0, duration: 0 }); // reset for timeline

// ── 3. GSAP ScrollTrigger: bg image tilts as you scroll ──
gsap.to(imgStage, {
  scrollTrigger: {
    trigger: '.hero',
    start: 'top top',
    end: 'bottom top',
    scrub: 1.5
  },
  rotateX: 8,
  rotateY: -2,
  scale: 1.04,
  ease: 'none'
});

// ── 4. Parallax on bg image itself ──
gsap.to('#heroBg', {
  scrollTrigger: {
    trigger: '.hero',
    start: 'top top',
    end: 'bottom top',
    scrub: 1.5
  },
  y: -80,
  ease: 'none'
});

// ── 5. Mouse 3D tilt on img-stage ──
document.querySelectorAll('.img-stage').forEach(el => {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(1400px) rotateX(${-y * 6}deg) rotateY(${x * 6}deg) scale(1.01)`;
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = '';
  });
});
</script>
</body>
</html>
