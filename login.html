<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Client portal — Green Wadi</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gw.css">
<style>
  body{ padding-top:72px; background:
    radial-gradient(60% 60% at 20% 30%, rgba(16,185,129,0.12), transparent 60%),
    radial-gradient(50% 50% at 80% 70%, rgba(244,199,123,0.3), transparent 60%),
    #F8F9F5;
    min-height: 100vh;
  }
  .login-card{ max-width: 420px; margin: 60px auto; background:#fff; border:1px solid rgba(15,23,42,0.08); border-radius: 22px; padding: 36px; box-shadow: 0 40px 80px -30px rgba(15,23,42,0.22);}
  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom: 14px; }
  .field label{ font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#64748B; }
  .field input{ background:#F8F9F5; border:1px solid rgba(15,23,42,0.08); border-radius: 12px; padding: 14px 16px; font-size:15px; outline:none; transition: border-color .3s, box-shadow .3s; font-family: Inter, sans-serif;}
  .field input:focus{ border-color: var(--green-deep); box-shadow: 0 0 0 6px rgba(16,185,129,0.08);}
  #errmsg{ color:#DC2626; font-size:13px; min-height:20px; margin-top:4px;}
</style>
</head>
<body data-page="login">
<div class="login-card">
  <div class="eyebrow mb-2">— Client portal</div>
  <h1 class="h2" style="font-size:32px">Welcome back.</h1>
  <p class="small mt-3">Access your telemetry, audit reports and the five-year plan for every estate under our stewardship.</p>
  <form class="mt-8" onsubmit="event.preventDefault(); doLogin();">
    <div class="field"><label>Username</label><input type="text" id="username" placeholder="your-username" required autocomplete="username"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••••" required autocomplete="current-password"/></div>
    <div id="errmsg"></div>
    <button class="btn btn-primary lg" style="width:100%; justify-content:center; margin-top:8px;" type="submit">Sign in
      <svg class="arrow" width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </form>
  <div class="hairline mt-8"></div>
  <div class="flex items-center justify-between mt-4">
    <a href="signup.html" class="small" style="text-decoration:underline; color:#0F7B52">Create account</a>
    <a href="index.html" class="small" style="color:#64748B">Back to home</a>
  </div>
</div>
<script src="/js/gw.js"></script>
<script>
async function doLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errmsg = document.getElementById('errmsg');
  errmsg.textContent = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errmsg.textContent = data.error || 'Wrong username or password.'; return; }
    localStorage.setItem('gw_token', data.token);
    window.location.href = '/index.html';
  } catch { errmsg.textContent = 'Server error — please try again.'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
