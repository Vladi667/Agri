<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Our scope — Green Wadi</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gw.css">
<style>
  body{ padding-top:72px; background:#F8F9F5;}
  .intro{ padding: 100px 0 60px; background: radial-gradient(70% 50% at 20% 20%, rgba(16,185,129,0.12), transparent 60%), #F8F9F5;}
  .sector-card{ display:block; position:relative; padding:22px; border:1px solid rgba(15,23,42,0.08); border-radius:20px; background:#fff; transition: transform .4s, box-shadow .4s, border-color .4s; cursor:pointer; text-decoration:none; color:inherit;}
  .sector-card:hover{ transform:translateY(-3px); box-shadow: 0 24px 54px -24px rgba(15,23,42,0.22); border-color: rgba(16,185,129,0.35); }
  .sector-card .num{ font-family:"Fraunces",serif; font-weight:300; font-size:42px; color: rgba(15,95,58,0.3); line-height:1; letter-spacing:-0.02em;}
  .sector-card .ico{ width:44px; height:44px; border-radius:12px; background: linear-gradient(135deg,#E9FBF3,#B9E6D0); display:flex; align-items:center; justify-content:center; color:#0F7B52; margin-bottom:14px;}
  .sector-card h3{ font-family:"Fraunces",serif; font-weight:400; font-size:22px; letter-spacing:-0.01em; margin-top:10px; color:#0B1220;}
  .sector-card .bdesc{ font-size:13.5px; color:#334155; margin-top:6px; line-height:1.5;}
  .sector-card .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
  .sector-card .tag{ font-size:10.5px; padding:3px 8px; border-radius:999px; background:#F2F4EC; color:#1E2A3A; letter-spacing:.04em;}
</style>
</head>
<body data-page="scope">
<section class="intro">
  <div class="wrap">
    <div class="eyebrow mb-5">— Our scope</div>
    <h1 class="h1 max-w-[22ch]">Twelve sectors. One connected, precise, multi-generational practice.</h1>
    <p class="body max-w-[64ch] mt-8">Each sector is its own discipline. But the gains compound when they run on shared telemetry, shared soil, shared water. Explore the full scope below.</p>
  </div>
</section>
<section class="section" style="padding-top:32px">
  <div class="wrap grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="sectorGrid"></div>
</section>
<script src="/js/gw.js"></script>
<script>
const sectors = [
  {n:'01', t:'Crops', d:'Cereals, oilseeds, pulses — precision rotations and cover-crop programs built on soil carbon accrual.', tags:['Wheat','Barley','Pulses','Cover crops'], icon:'M3 14h18M5 14v-3a3 3 0 016 0v3M13 14v-5a3 3 0 016 0v5'},
  {n:'02', t:'Horticulture', d:'Fruit, vegetables and high-value specialty lines with variable-rate fertigation and pest early-warning.', tags:['Pomes','Stone fruit','Leafy greens'], icon:'M12 22V10M8 10a4 4 0 118 0M10 6a2 2 0 114 0'},
  {n:'03', t:'Open field production', d:'Broad-acre optimisation, residue management, watershed stewardship with independent audits on every hectare.', tags:['Rotation','Residue','Audit'], icon:'M3 17h18M3 13h18M3 9h18M3 5h18'},
  {n:'04', t:'Protected production', d:'Greenhouse, net-house and vertical systems — energy, CO₂ and labour optimised as a single system.', tags:['Greenhouse','Net-house','Vertical'], icon:'M3 20h18M5 20V8l7-4 7 4v12M9 20v-6h6v6'},
  {n:'05', t:'Livestock', d:'Welfare-first intensification, rotational grazing, silvopasture and end-to-end traceability for every animal.', tags:['Cattle','Sheep','Poultry'], icon:'M4 15c0-3 3-5 6-5s6 2 6 5v5H4v-5z'},
  {n:'06', t:'Aquaculture', d:'Closed-loop, species-appropriate production paired with horticulture for nutrient cycling and reduced footprint.', tags:['IMTA','RAS','Aquaponics'], icon:'M3 12c3-3 7-3 10 0s7 3 10 0'},
  {n:'07', t:'Post-harvest', d:'Cold chain, sorting, grading, traceable logistics. Every crate is scanned, sealed and signed-for.', tags:['Cold chain','Grading','Trace'], icon:'M4 7h16v14H4zM4 7l2-3h12l2 3'},
  {n:'08', t:'Agro-industry', d:'Processing integration: value capture before the gate, emissions monitored, byproducts returned to the field.', tags:['Processing','Byproducts'], icon:'M3 20h18M5 20V10h4v10M10 20V6h4v14M15 20v-7h4v7'},
  {n:'09', t:'Forestry', d:'Silviculture plans, native species reintroduction, agroforestry designs and 25-year growth telemetry.', tags:['Silviculture','Agroforestry'], icon:'M12 22V12M12 12L6 16h12L12 12z'},
  {n:'10', t:'Land conservation', d:'Soil, watersheds, biodiversity corridors — landscape-scale planning that outlives any single tenancy.', tags:['Soil','Watershed','Corridors'], icon:'M3 18c3-2 5-5 9-5s6 3 9 5'},
  {n:'11', t:'Desertification prevention', d:'Drylands rehabilitation at scale: engineered swales, halophyte pioneers, native corridor reconnection.', tags:['Swales','Halophytes'], icon:'M3 17c2-4 4-6 9-6s7 2 9 6'},
  {n:'12', t:'Environmental protection', d:'Compliance, monitoring, restoration. We write the MRV plan; we then hold ourselves to it.', tags:['MRV','Restoration'], icon:'M12 3l8 4v5c0 5-4 9-8 9s-8-4-8-9V7l8-4z'},
];
document.getElementById('sectorGrid').innerHTML = sectors.map(s => `
  <a class="sector-card" href="services.html">
    <div class="flex items-start justify-between">
      <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="${s.icon}"/></svg></div>
      <div class="num">${s.n}</div>
    </div>
    <h3>${s.t}</h3>
    <p class="bdesc">${s.d}</p>
    <div class="tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  </a>`).join('');
</script>
</body>
</html>
